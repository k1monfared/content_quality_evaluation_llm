# Price table used only for cost bookkeeping and at-scale projections.
#
# Units: US dollars per 1,000,000 tokens, split into input (prompt) and
# output (completion).
#
# IMPORTANT ASSUMPTION: Poe bills API usage in its own compute points, not in
# per-token dollars. The values below are representative public list prices for
# each underlying model, used purely for planning and comparison. They are
# configurable: edit this file to match whatever pricing you want to reason
# about, and every cost number downstream updates automatically.
#
# Last reviewed against public provider pricing pages: 2026-07.

default:
  input: 1.00
  output: 3.00

